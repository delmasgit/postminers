version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postminer_db
    restart: always
    environment:
      POSTGRES_USER: postminer
      POSTGRES_PASSWORD: postminerpassword
      POSTGRES_DB: postminer_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: postminer_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    build: 
      context: ./backend
    container_name: postminer_api
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DATABASE_URL=postgres://postminer:postminerpassword@db:5432/postminer_db
      - REDIS_URL=redis://redis:6379/1

  frontend:
    build:
      context: ./frontend
    container_name: postminer_frontend
    restart: always
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
